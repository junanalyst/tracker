name: Deploy TRACKER to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: API 키 주입
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          sed -i "s|__OPENROUTER_API_KEY__|${OPENROUTER_API_KEY}|g" tracker.html

      - name: 배포 폴더 준비
        run: |
          mkdir -p dist
          cp tracker.html dist/index.html

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v4

      - name: 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: 배포
        id: deployment
        uses: actions/deploy-pages@v4
