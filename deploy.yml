# ============================================================
#  TRACKER — GitHub Actions 자동 배포
#
#  작동 방식:
#  1. GitHub에 코드 push
#  2. 이 워크플로우가 자동 실행
#  3. GitHub Secret에서 API 키를 가져와 HTML에 주입
#  4. 완성된 HTML을 GitHub Pages에 배포
#  5. https://[내이름].github.io/tracker 로 접속 가능!
#
#  ⚠️  사전 설정 필요:
#  GitHub 저장소 → Settings → Secrets and variables → Actions
#  → New repository secret → GEMINI_API_KEY 등록
# ============================================================

name: Deploy TRACKER to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4

      - name: 🔑 API 키를 HTML에 안전하게 주입
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          sed -i "s|__OPENROUTER_API_KEY__|${OPENROUTER_API_KEY}|g" tracker.html
          echo "✅ API 키 주입 완료"

      - name: 📁 배포 폴더 준비
        run: |
          mkdir -p dist
          cp tracker.html dist/index.html
          echo "✅ 배포 파일 준비 완료"

      - name: ⚙️ GitHub Pages 설정
        uses: actions/configure-pages@v4

      - name: 📤 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: 🚀 GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
